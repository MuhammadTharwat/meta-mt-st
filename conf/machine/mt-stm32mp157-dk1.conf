MACHINEOVERRIDES =. "stm32mp15-disco:"

require conf/machine/stm32mp15-disco.conf

PREFERRED_VERSION_virtual/kernel = "6.6"


## RAM Disk values
## Kernel Load Address at 16 Mbytes
UBOOT_LOADADDRESS = "0x1000000"
UBOOT_ENTRYPOINT = "0x1000000"

## RAM Disk at 32 Mbytes
UBOOT_RD_LOADADDRESS = "0x2000000"
UBOOT_RD_ENTRYPOINT = "0x2000000"

## DTB at 36 Mbytes
UBOOT_DTB_LOADADDRESS = "0x2400000"


MENDER_DEVICE_TYPE = "${MACHINE}"


IMAGE_BOOT_FILES:remove = "boot.bin"
IMAGE_BOOT_FILES:remove = "boot.scr"
IMAGE_BOOT_FILES:remove = "uImage"
IMAGE_BOOT_FILES:remove = "zImage"

# Auto load i2c module
KERNEL_MODULE_AUTOLOAD += "i2c-dev"
WKS_FILE = "rpi0-w.wks"