# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bb \
	        ${LAYERDIR}/recipes-*/*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend \
            ${LAYERDIR}/recipes-*/*/*/*.bbappend"

# BBFILES_DYNAMIC += "\
#     mender:${LAYERDIR}/dynamic-layers/mender/*/*/*.bbappend \
# "

BBFILE_COLLECTIONS += "meta-mt-rpi"
BBFILE_PATTERN_meta-mt-rpi= "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-mt-rpi = "10"

LAYERDEPENDS_meta-mt-rpi = "core"
LAYERSERIES_COMPAT_meta-mt-rpi = "scarthgap"
